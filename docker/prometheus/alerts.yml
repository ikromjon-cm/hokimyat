groups:
  - name: uychi-majlis-alerts
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="uychi-majlis-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend server is down"
          description: "Backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(uychi_majlis_http_requests_total{status=~"5.."}[5m]) / rate(uychi_majlis_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(uychi_majlis_http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "P95 response time is above 5 seconds."

      - alert: RedisDown
        expr: redis_up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 1 minute."

      - alert: HighRedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 80%."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 10 minutes."

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 85%."

      - alert: QueueSizeGrowing
        expr: rate(uychi_majlis_queue_size[5m]) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Queue size growing"
          description: "BullMQ queue size is growing rapidly."
