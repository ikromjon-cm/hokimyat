name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @uychi-majlis/backend db:generate

      - name: Lint backend
        run: pnpm --filter @uychi-majlis/backend lint

      - name: TypeScript check backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: TypeScript check mobile
        run: npx tsc --noEmit
        working-directory: apps/mobile

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uychi_majlis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @uychi-majlis/backend db:generate

      - name: Run migrations
        run: pnpm --filter @uychi-majlis/backend db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uychi_majlis_test?schema=public

      - name: Seed test data
        run: pnpm --filter @uychi-majlis/backend db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uychi_majlis_test?schema=public

      - name: Run unit & integration tests
        run: pnpm --filter @uychi-majlis/backend test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uychi_majlis_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-32-chars!!
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars!
          NODE_ENV: test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/uychi-majlis-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/uychi-majlis-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/uychi-majlis
            git pull origin main
            docker compose -f docker/docker-compose.yml pull backend
            docker compose -f docker/docker-compose.yml up -d --force-recreate backend
            docker compose -f docker/docker-compose.yml exec backend npx prisma migrate deploy
            docker image prune -f
