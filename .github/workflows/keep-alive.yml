name: Keep backend awake

# Render free web services spin down after ~15 min of inactivity, which makes
# the next request slow (cold start ~50s) and can fail the app's first call.
# This pings /health on a schedule to keep it warm. GitHub cron runs can be
# delayed, so for fully reliable keep-alive also add a job on cron-job.org.

on:
  schedule:
    - cron: "*/12 * * * *" # every ~12 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS -m 90 https://uychi-majlis-backend.onrender.com/health \
            -o /dev/null -w "health: %{http_code} in %{time_total}s\n" || true
